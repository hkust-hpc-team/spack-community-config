spack:
  concretizer:
    reuse: false
    targets:
      granularity: microarchitectures
      host_compatible: false
    unify: false
  definitions:
    - cc-aocc-targets:
        - matrix:
            - - target=x86_64
              - target=zen
              - target=zen2
              - target=zen3
              - target=icelake
              - target=zen4
            - - "%aocc@4.2.0"
              - "%aocc@5.0.0"
    - cc-gcc-targets:
        - matrix:
            - - target=x86_64
              - target=zen
              - target=x86_64_v2
              - target=zen2
              - target=x86_64_v3
              - target=zen3
              - target=x86_64_v4
              - target=icelake
              - target=sapphirerapids
              - target=zen4
            - - "%gcc@11.5.0"
              - "%gcc@12.4.0"
              - "%gcc@13.3.0"
              - "%gcc@14.2.0"
    - cc-intel-targets:
        - matrix:
            - - target=x86_64
              - target=zen
              - target=x86_64_v2
              - target=zen2
              - target=x86_64_v3
              - target=zen3
              - target=x86_64_v4
              - target=icelake
              - target=sapphirerapids
            - - "%intel@2021.10.0"
    - cc-oneapi-targets:
        - matrix:
            - - target=x86_64
              - target=zen
              - target=x86_64_v2
              - target=zen2
              - target=x86_64_v3
              - target=zen3
              - target=x86_64_v4
              - target=icelake
              - target=sapphirerapids
            - - "%oneapi@2021.4.0"
              - "%oneapi@2022.2.1"
              - "%oneapi@2023.2.4"
              - "%oneapi@2024.2.1"
              - "%oneapi@2025.0.4"
    - test-autotools-pkgs:
        - libsigsegv build_system=autotools
        - lzo libs=shared,static build_system=autotools
    - test-cmake-pkgs:
        - blake3 build_system=cmake
        - lz4 libs=shared,static +pic +ipo build_system=cmake
    - test-makefile-pkgs:
        - openlibm build_system=makefile
        - mbedtls libs=shared,static +pic build_system=makefile
    - test-asm:
        - zlib-ng ~compat +ipo build_system=cmake
  packages:
    all:
      conflict:
        - "%gcc@11.4.1.os"
        - "%gcc@11.5.0.spack"
      providers:
        zlib-api: ["zlib-ng+compat", "zlib"]
      require:
        - one_of:
            - "%aocc@:"
            - "%gcc@:"
            - "%intel@:"
            - "%oneapi@:"
    cmake:
      externals:
        - prefix: /usr
          spec: cmake@3.26.5
    gcc-runtime:
      conflict:
        - "%gcc@11.4.1.os"
      require:
        - one_of:
            - "%gcc@:"
            - "%gcc@11.5.0.spack"
    glibc:
      externals:
        - prefix: /usr
          spec: glibc@2.34
    perl:
      externals:
        - prefix: /usr
          spec: perl@5.32.1
    python:
      externals:
        - prefix: /usr
          spec: python@3.9.18
        - prefix: /usr
          spec: python@3.11.7
  specs:
    - matrix:
        - - $test-autotools-pkgs
          - $test-cmake-pkgs
          - $test-makefile-pkgs
          - $test-asm
        - - $cc-aocc-targets
          - $cc-gcc-targets
          - $cc-intel-targets
          - $cc-oneapi-targets
  'upstreams:': {}
  view: false
