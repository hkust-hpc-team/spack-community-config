spack:
  concretizer:
    targets:
      granularity: generic
      host_compatible: true
  modules:
    default:
      lmod:
        r:
          template: modules/r-modulefile.lua
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - r@4.4.1
    - rstudio@2024.09.1
  view: false
