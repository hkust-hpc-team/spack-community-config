spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - bash
    - dos2unix
    - emacs +json
    - expat
    - expect
    - gdb
    - gperf
    - neovim
    - parallel
    - screen
    - tcsh
    - zsh
  view: false
