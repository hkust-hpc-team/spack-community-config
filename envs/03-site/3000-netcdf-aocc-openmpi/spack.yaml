spack:
  concretizer:
    targets:
      granularity: microarchitectures
      host_compatible: false
    unify: false
  definitions:
    - goals:
        - "hdf5"
        - "netcdf-c"
        - "netcdf-fortran"
        - "parallel-netcdf"
        - "parallelio"
    - ccs:
        - matrix:
            - - "target=zen4"
            - - "%aocc@5.0.0"
    - mpis:
        - ^openmpi@5
        - ^openmpi@4
  specs:
    - matrix:
        - - $goals
        - - $ccs
        - - $mpis
  view: false
