spack:
  concretizer:
    targets:
      granularity: microarchitectures
      host_compatible: false
    unify: false
  definitions:
    - goals:
        - "hdf5"
        - "netcdf-c"
        - "netcdf-fortran"
        - "parallel-netcdf"
        - "parallelio"
    - ccs:
        - matrix:
            - - "target=zen4"
            - - "%aocc@5.0.0"
              - "%aocc@4.2.0"
    - mpis:
        - ^openmpi@4
        - ^openmpi@5
  packages:
    all:
      require:
        - one_of:
            - "target=zen4 %aocc@:"
            - "target=x86_64_v4 %gcc@11.5.0.spack"
    gcc-runtime:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - matrix:
        - - $goals
        - - $ccs
        - - $mpis
  view: false
