spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  definitions:
    - conda_specs:
        - matrix:
            - - anaconda3
            - - "@2025.06-1"
              - "@2024.10-1"
              - "@2023.09-0"
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - $conda_specs
  view: false
