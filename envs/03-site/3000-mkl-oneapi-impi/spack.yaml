spack:
  concretizer:
    targets:
      granularity: microarchitectures
      host_compatible: false
    unify: false
  definitions:
    - goals:
        - matrix:
            - - "intel-oneapi-mkl +cluster mpi_family=mpich threads=tbb"
            - - "@2025.0.1"
              - "@2024.2.2"
              - "@2023.2.0"
    - ccs:
        - matrix:
            - - "target=x86_64_v4"
            - - "%oneapi@2025.0.4"
              - "%oneapi@2024.2.1"
              - "%oneapi@2023.2.4"
    - mpis:
        - ^intel-oneapi-mpi@2021
  packages:
    all:
      require:
        - one_of:
            - "target=x86_64_v4 %oneapi@:"
            - "target=x86_64_v4 %gcc@11.5.0.spack"
    gcc-runtime:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - matrix:
        - - $goals
        - - $ccs
        - - $mpis
  view: false
