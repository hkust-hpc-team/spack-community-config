spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
    gcc-runtime:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - go
    - openjdk
    - perl
    - python@3.11
    - rust
  view: false
