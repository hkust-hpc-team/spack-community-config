spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  packages:
    all:
      require:
      - target=x86_64_v4 %gcc@11.5.0.spack
    gcc-runtime:
      require:
      - target=x86_64_v4 %gcc@11.5.0.spack
  specs:
  - core-packages
  view: false
  compilers:
  - compiler:
      spec: gcc@=11.5.0
      paths:
        cc: /usr/bin/gcc
        cxx: /usr/bin/g++
        f77: /usr/bin/gfortran
        fc: /usr/bin/gfortran
      flags: {}
      operating_system: rocky9
      target: x86_64
      modules: []
      environment: {}
      extra_rpaths: []
