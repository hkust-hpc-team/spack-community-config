spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - openjdk@17
    - openjdk@11
    - openjdk@1.8
    - ant
    - gradle
    - maven
  view: false
