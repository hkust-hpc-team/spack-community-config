spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  modules:
    default:
      lmod:
        matlab:
          template: modules/matlab-modulefile.lua
  specs:
    - matrix:
        - - "matlab"
        - - "@R2024a"
          - "@R2023b"
          - "@R2022b"
          - "@R2019b"
        - - target=x86_64_v4 %gcc@11.5.0.spack
  view: false
