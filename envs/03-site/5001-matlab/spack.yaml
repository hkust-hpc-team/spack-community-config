spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - matlab@R2023b
    - matlab@R2022b
    - matlab@R2019b mode=silent
  view: false
