spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  definitions:
    - pyvers:
        - "@3.13"
        - "@3.12"
        - "@3.11"
        - "@3.10"
        - "@3.9"
    - pythons:
        - matrix:
            - - python
            - - $pyvers
  modules:
    default:
      lmod:
        anaconda3:
          template: modules/anaconda3-modulefile.lua
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - anaconda3
    - $pythons
  view: false
