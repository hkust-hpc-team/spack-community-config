spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  modules:
    default:
      lmod:
        matlab:
          template: modules/matlab-modulefile.lua
        perl:
          template: modules/perl-modulefile.lua
        r:
          template: modules/r-modulefile.lua
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - dotnet-core-sdk
    - go
    - lua
    - ocaml
    - octave
    - perl
    - ruby
    - rust
    - tcl
  view: false
