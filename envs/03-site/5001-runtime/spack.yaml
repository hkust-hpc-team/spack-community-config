spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - dotnet-core-sdk
    - go
    - lua
    - matlab@R2024a
    - matlab@R2023b
    - matlab@R2022b
    - matlab@R2019b
    - ocaml
    - octave
    - perl
    - ruby
    - rust
    - tcl
  view: false
