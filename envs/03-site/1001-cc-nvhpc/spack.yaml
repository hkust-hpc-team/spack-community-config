spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
    gcc-runtime:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - matrix:
        - - "nvhpc"
        - - "@25.1"
          - "@24.11"
          - "@23.11"
  view: false
