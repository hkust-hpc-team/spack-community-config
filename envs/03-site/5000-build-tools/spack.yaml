spack:
  concretizer:
    reuse: false
    targets:
      granularity: generic
      host_compatible: true
    unify: false
  packages:
    all:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
  specs:
    - autotools
    - bazel
    - binutils
    - bison
    - cmake
    - doxygen
    - easybuild
    - flex
    - fpm
    - gmake
    - googletest
    - meson
    - ninja
    - scons
    - swig
    - texinfo
  view: false
