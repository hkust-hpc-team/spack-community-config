spack:
  concretizer:
    targets:
      granularity: microarchitectures
      host_compatible: false
    unify: false
  definitions:
    - goals:
        - "netcdf-fortran"
        - "netcdf-c"
        - "hdf5"
    - ccs:
        - matrix:
            - - "target=x86_64_v4"
            - - "%intel@2021.10.0 ^intel-oneapi-runtime@2023%oneapi@2023.2.4"
              - "%oneapi@2025.0.4 ^intel-oneapi-runtime@2025%oneapi@2025.0.4"
              - "%oneapi@2024.2.1 ^intel-oneapi-runtime@2024%oneapi@2024.2.1"
              - "%oneapi@2023.2.4 ^intel-oneapi-runtime@2023%oneapi@2023.2.4"
              - "%oneapi@2022.2.1 ^intel-oneapi-runtime@2022%oneapi@2022.2.1"
              - "%oneapi@2021.4.0 ^intel-oneapi-runtime@2021%oneapi@2021.4.0"
    - mpis:
        - ^intel-oneapi-mpi@2021
        - ^mpich@4
        - ^mpich@3
        - ^mvapich-plus@4
        - ^openmpi@5
        - ^openmpi@4
  packages:
    all:
      require:
        - one_of:
            - "target=x86_64_v4 %oneapi@:"
            - "target=x86_64_v4 %intel@:"
            - "target=x86_64_v4 %gcc@11.5.0.spack"
    gcc-runtime:
      require:
        - "target=x86_64_v4 %gcc@11.5.0.spack"
    hdf5:
      prefer:
        - "@1.14:"
        - +cxx
        - +fortran
        - +hl
        - +map
        - +mpi
        - +shared
        - +subfiling
        - +szip
        - +threadsafe
        - +tools
    netcdf-c:
      prefer:
        - "@4.9:"
        - +blosc
        - +byterange
        - +fsync
        - +logging
        - +mpi
        - +nczarr_zip
        - +optimize
        - +parallel-netcdf
        - +pic
        - +shared
        - +szip
        - +zstd
    parallel-netcdf:
      prefer:
        - "@1.14:"
        - +burstbuffer
        - +cxx
        - +fortran
        - +pic
        - +shared
  specs:
    - matrix:
        - - $goals
        - - $ccs
        - - $mpis
  view: false
