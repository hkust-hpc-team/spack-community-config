modules:
  default:
    arch_folder: true
    enable:
      - lmod
    lmod:
      all:
        autoload: run
      aocc:
        autoload: direct
      core_compilers:
        - gcc@11.5.0.spack
      gcc:
        autoload: direct
      hide_implicits: true
      hierarchy:
        - mpi
        - compiler
      intel-oneapi-compilers:
        autoload: direct
      intel-oneapi-compilers-classic:
        autoload: direct
      intel-oneapi-mpi:
        autoload: direct
        environment:
          "set:":
            I_MPI_FABRICS: "shm:ofi"
      openmpi:
        autoload: direct
      projections:
        all: "{name}/{version}"
        hdf5: "{name}/{version}-{target.name}"
        intel-oneapi-mpi: "{name}/{version}-{target.name}"
        mpich: "{name}/{version}-{target.name}"
        netcdf-c: "{name}/{version}-{target.name}"
        netcdf-fortran: "{name}/{version}-{target.name}"
        openmpi: "{name}/{version}-{target.name}"
        parallel-netcdf: "{name}/{version}-{target.name}"
        parallelio: "{name}/{version}-{target.name}"
  prefix_inspections:
    ./:
      - CMAKE_PREFIX_PATH
    ./bin:
      - PATH
    ./include:
      - CPATH
      - C_INCLUDE_PATH
      - CPLUS_INCLUDE_PATH
      - INCLUDE
    ./lib:
      - LD_LIBRARY_PATH
      - LIBRARY_PATH
    ./lib/pkgconfig:
      - PKG_CONFIG_PATH
    ./lib64:
      - LD_LIBRARY_PATH
      - LIBRARY_PATH
    ./lib64/pkgconfig:
      - PKG_CONFIG_PATH
    ./man:
      - MANPATH
    ./sbin:
      - PATH
    ./share/aclocal:
      - ACLOCAL_PATH
    ./share/man:
      - MANPATH
    ./share/pkgconfig:
      - PKG_CONFIG_PATH
