packages:
  knem:
    buildable: false
    externals:
      - prefix: /opt/knem-1.1.4.90mlnx3
        spec: knem@1.1.4
  munge:
    buildable: false
    externals:
      - prefix: /usr
        spec: munge@0.5.13
  mvapich-plus:
    buildable: false
    externals:
      - prefix: /opt/mvapich/plus/4.0/.ucx/mpirun/gcc13.2.0/
        spec: mvapich-plus@4 ~cuda ~rocm netmod=ucx process_managers=slurm
  pmix:
    conflict:
      - "%gcc@11.5.0.spack"
    externals:
      - prefix: /usr
        spec: pmix@3.2.3 +munge
    prefer:
      - "@5"
    require:
      - +munge
      - spec: +pmi_backwards_compatibility
        when: "@:3"
  rdma-core:
    buildable: false
    externals:
      - prefix: /usr
        spec: rdma-core@52.0
  slurm:
    buildable: false
    externals:
      - prefix: /usr
        spec: slurm@22-05-9-1
