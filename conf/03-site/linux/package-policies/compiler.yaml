packages:
  aocc:
    prefer:
      - +license-agreed
    require:
      - "target=x86_64_v4 %gcc@11.5.0.spack"
  binutils:
    prefer:
      - +gas
      - +gold
      - +headers
      - +ld
      - +lto
    require:
      - "@2.36:"
      - "target=x86_64_v4 %gcc@11.5.0.spack"
  gcc:
    prefer:
      - +bootstrap
      - +graphite
      - +mold
      - ~nvptx
      - +piclibs
      - +profiled
      - languages=c,c++,fortran,lto
    require:
      - "target=x86_64_v4 %gcc@11.5.0.spack"
      - +binutils
  intel-oneapi-compilers:
    require:
      - "target=x86_64_v4 %gcc@11.5.0.spack"
  intel-oneapi-compilers-classic:
    require:
      - "target=x86_64_v4 %gcc@11.5.0.spack"
  nvhpc:
    require:
      - "target=x86_64_v4 %gcc@11.5.0.spack"
