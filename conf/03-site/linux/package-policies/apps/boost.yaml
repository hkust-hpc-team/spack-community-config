packages:
  boost:
    prefer:
      - ~mpi
    require:
      - +atomic
      - +chrono
      - +container
      - +coroutine
      - +date_time
      - +exception
      - +filesystem
      - +graph
      - +icu
      - +iostreams
      - +json
      - +locale
      - +log
      - +multithreaded
      - +pic
      - +program_options
      - +random
      - +regex
      - +serialization
      - +system
      - +test
      - +timer
      - +type_erasure
      - +url
      - +wave
      - spec: +charconv
        when: "@1.85:"
      - spec: +cobalt
        when: "@1.84:"
