packages:
  hdf5:
    prefer:
      - "@1.14:"
      - +cxx
      - +fortran
      - +hl
      - +map
      - +mpi
      - +shared
      - +threadsafe
      - +tools
      - +szip
    require:
      - spec: +mpi +subfiling ^openmpi%aocc
        when: "%aocc"
      - one_of:
          - +mpi +subfiling ^openmpi%oneapi
          - +mpi +subfiling ^intel-oneapi-mpi%oneapi
        when: "%oneapi"
      - spec: "~mpi"
        when: "%gcc@11.5.0.spack"
  netcdf-c:
    prefer:
      - "@4.9:"
      - +blosc
      - +byterange
      - +fsync
      - +logging
      - +mpi
      - +nczarr_zip
      - +optimize
      - +pic
      - +shared
      - +szip
      - +zstd
    require:
      - spec: +mpi +parallel-netcdf ^openmpi%aocc
        when: "%aocc"
      - one_of:
          - +mpi +parallel-netcdf ^openmpi%oneapi
          - +mpi +parallel-netcdf ^intel-oneapi-mpi%oneapi
        when: "%oneapi"
      - spec: "~mpi ~parallel-netcdf"
        when: "%gcc@11.5.0.spack"
  parallel-netcdf:
    prefer:
      - "@1.14:"
      - +burstbuffer
      - +cxx
      - +fortran
      - +pic
      - +shared
  parallelio:
    prefer:
      - "@2.6:"
      - +fortran
      - +pnetcdf
      - +shared
      - +ncint
    require:
      - spec: +mpi ^openmpi%aocc
        when: "%aocc"
      - one_of:
          - +mpi ^openmpi%oneapi
          - +mpi ^intel-oneapi-mpi%oneapi
        when: "%oneapi"
